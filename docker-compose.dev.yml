version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: techhelp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: techhelp_user
      MONGO_INITDB_ROOT_PASSWORD: techhelp_pass
      MONGO_INITDB_DATABASE: techhelp_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    driver: local
