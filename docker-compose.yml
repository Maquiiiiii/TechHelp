# docker-compose.yml — Entorno de DESARROLLO LOCAL
# Usa MongoDB local en contenedor.
# Para producción con Atlas, ver docker-compose.atlas.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techhelp_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/techhelp_db
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeytechhelp2026!}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - PYTHONPATH=/app
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - techhelp_network
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: techhelp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb_init:/docker-entrypoint-initdb.d
    networks:
      - techhelp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
  uploads_data:

networks:
  techhelp_network:
    driver: bridge
